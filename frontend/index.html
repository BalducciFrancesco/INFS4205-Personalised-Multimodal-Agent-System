<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>INFS4205 - Personalized Multimodal Agent</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪨</text></svg>" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="title">
      <h1>INFS4205 - Personalized Multimodal Agent</h1>
      <small>handcrafted by fra @ <a href="https://github.com/BalducciFrancesco/INFS4205-Personalised-Multimodal-Agent-System" target="_blank">GitHub</a></small>
    </div>
    <section
      id="conversation"
      class="thread"
      aria-live="polite"
      aria-label="Chat messages"
    ></section>

    <form id="chat-form" autocomplete="off">
      <label for="user-id">UID</label>
      <select id="user-id" disabled aria-label="User ID"></select>

      <textarea
        id="message"
        rows="1"
        placeholder="Write a message to the thinking rock..."
        required
        aria-label="Message"
      ></textarea>

      <input
        id="image-input"
        type="file"
        accept="image/png,image/jpeg,image/webp"
        hidden
      />
      <button
        type="button"
        id="attach-button"
        class="composer-attach"
        aria-label="Attach image"
        title="Attach image"
      >
        <span class="attach-icon attach-plus" aria-hidden="true">+</span>
        <span class="attach-icon attach-photo" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
        </span>
        <span class="attach-icon attach-clear" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </span>
      </button>

      <button id="send-button" type="submit">Send</button>
    </form>

    <script src="script.js"></script>
  </body>
</html>
